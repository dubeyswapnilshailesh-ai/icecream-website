<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Ice Cream Heaven</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>🍦 Contact Ice Cream Heaven 🍨</h1>
    <p>We’d love to hear from you! Get in touch below.</p>
    <nav>
      <a href="index.html">Home</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <section class="contact-section">
    <div class="contact-container">
      <h2>📞 Get in Touch</h2>
      <p>Fill out the form and we’ll respond as soon as possible!</p>

      <form class="contact-form">
        <label for="name">Full Name:</label>
        <input type="text" id="name" placeholder="Enter your name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <label for="message">Message:</label>
        <textarea id="message" rows="5" placeholder="Write your message here..." required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>
  </section>

  <footer>
    <p>© 2025 Ice Cream Heaven | Made with ❤️ by Swapnil Dubey</p>
  </footer>

  <script>
    // Show after form submission
    document.querySelector(".contact-form").addEventListener("submit", function(e) {
      e.preventDefault();
      alert("🍨 Thank you for contacting Ice Cream Heaven! We’ll get back to you soon.");
      this.reset();
    });
  </script>
</body>
</html>
